<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>A Famosa: Streets of Golden Melaka</title>
  
  <!-- Historical Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0806;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Crimson Text', Georgia, serif;
      color: #F4B41A;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #0a0806 0%, #1a1410 50%, #0a0806 100%);
    }

    canvas {
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      max-width: 100%;
      max-height: 100%;
    }

    /* Fullscreen button */
    .fullscreen-btn {
      position: fixed;
      bottom: 15px;
      right: 15px;
      background: rgba(61, 40, 23, 0.9);
      border: 1px solid #D4AF37;
      color: #D4AF37;
      padding: 8px 14px;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 9999;
      border-radius: 3px;
    }

    .fullscreen-btn:hover {
      background: rgba(139, 0, 0, 0.8);
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
    }

    /* Hide button in fullscreen */
    :fullscreen .fullscreen-btn,
    :-webkit-full-screen .fullscreen-btn {
      display: none;
    }

    /* Ensure game fills screen in fullscreen */
    :fullscreen #game-container,
    :-webkit-full-screen #game-container {
      width: 100vw !important;
      height: 100vh !important;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- Phaser canvas inserted here -->
  </div>
  
  <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen [F]</button>

  <script>
    function toggleFullscreen() {
      const elem = document.documentElement;
      
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
      }
    }

    // F key for fullscreen (when not in input)
    document.addEventListener('keydown', (e) => {
      if ((e.key === 'f' || e.key === 'F') && 
          document.activeElement.tagName !== 'INPUT' &&
          document.activeElement.tagName !== 'TEXTAREA') {
        toggleFullscreen();
      }
    });

    // Prevent context menu on right-click
    document.addEventListener('contextmenu', (e) => e.preventDefault());
  </script>
</body>
</html>
