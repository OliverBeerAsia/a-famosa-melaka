<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Famosa: Streets of Golden Melaka</title>

  <!-- Historical Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0806;
    }

    body {
      font-family: 'Crimson Text', Georgia, serif;
      color: #D4C4A8;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #root {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Pixel-perfect rendering */
    canvas {
      image-rendering: optimizeSpeed;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }

    /* Disable text selection in game */
    .game-container {
      user-select: none;
      -webkit-user-select: none;
    }

    /* Custom scrollbar for UI */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #2A1A0A;
    }

    ::-webkit-scrollbar-thumb {
      background: #5C4033;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #8B7355;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
